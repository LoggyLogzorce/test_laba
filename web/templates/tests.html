<!DOCTYPE html>
<html>
<head>
  <title>Тесты</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid #ddd; padding: 8px; }
    .admin-panel { margin: 20px 0; padding: 15px; background: #e0e0e0; }
    input { margin: 5px; padding: 5px; }
  </style>
</head>
<body>
<h2>Список тестов</h2>
<a href="/logout">Выход</a> | <a href="/attempts">Мои попытки</a>
<span id="userRole"></span>

<div class="admin-panel" id="adminPanel" style="display:none;">
  <h3>Управление тестами</h3>
  <input type="text" id="testTitle" placeholder="Название">
  <input type="text" id="testDesc" placeholder="Описание">
  <input type="number" id="testTime" placeholder="Время (мин)">
  <input type="number" id="testScore" placeholder="Проходной балл">

  <select id="testCategory"></select>
  <select id="active">
    <option value='true'>Да</option>
    <option value='false'>Нет</option>
  </select>

  <button id="createBtn" onclick="createTest()">Создать</button>
  <button id="updateBtn" onclick="updateTest()" style="display:none;">Обновить</button>
</div>

<table>
  <thead>
  <tr>
    <th>ID</th>
    <th>Название</th>
    <th>Категория</th>
    <th>Описание</th>
    <th>Время</th>
    <th>Балл</th>
    <th>Активен</th>
    <th>Действия</th>
  </tr>
  </thead>
  <tbody id="testsTable"></tbody>
</table>

<script>
  let role = '';

  async function loadCategories() {
    const res = await fetch('/api/categories');
    const categories = await res.json();

    const select = document.getElementById('testCategory');

    select.innerHTML = categories.map(c =>
            `<option value="${c.id_категории}">${c.название}</option>`
    ).join('');
  }

  async function loadTests() {
    const res = await fetch('/api/tests');
    const tests = await res.json();

    const tbody = document.getElementById('testsTable');

    tbody.innerHTML = tests.map(t => `
    <tr data-category-id="${t.id_категории}" data-active="${t.активен}">
      <td>${t.id_теста}</td>
      <td><a href="/test?id=${t.id_теста}">${t.название}</a></td>
      <td>${t.название_категории}</td>
      <td>${t.описание || ''}</td>
      <td>${t.лимит_времени}</td>
      <td>${t.проходной_балл}</td>
      <td>${t.активен ? 'Да' : 'Нет'}</td>
      <td>
        ${role === 'admin' ? `
        <button onclick="editTest(${t.id_теста})">Редактировать</button>
        <button onclick="deleteTest(${t.id_теста})">Удалить</button>
        ` : ''}
      </td>
    </tr>
  `).join('');
  }

  async function createTest() {

    const categoryId = document.getElementById('testCategory').value;


    await fetch('/api/test/create', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        "название": document.getElementById('testTitle').value,
        "описание": document.getElementById('testDesc').value,
        "лимит_времени": +document.getElementById('testTime').value,
        "проходной_балл": +document.getElementById('testScore').value,
        "id_категории": +categoryId,
        "активен": document.getElementById('active').value === 'true'
      })
    });

    loadTests();
  }

  function editTest(id) {
    const row = document.querySelector(`button[onclick="editTest(${id})"]`).closest('tr');

    document.getElementById('testTitle').value = row.children[1].textContent;
    document.getElementById('testDesc').value = row.children[3].textContent;
    document.getElementById('testTime').value = row.children[4].textContent;
    document.getElementById('testScore').value = row.children[5].textContent;

    const categoryId = row.dataset.categoryId;
    const active = row.dataset.active;
    document.getElementById('testCategory').value = categoryId;
    document.getElementById('active').value = active;


    document.getElementById('createBtn').style.display = 'none';
    document.getElementById('updateBtn').style.display = 'inline';

    document.getElementById('updateBtn').dataset.id = id;
  }

  async function updateTest() {
    const id = document.getElementById('updateBtn').dataset.id;

    await fetch(`/api/test/update`, {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        "id_теста": +id,
        "название": document.getElementById('testTitle').value,
        "описание": document.getElementById('testDesc').value,
        "лимит_времени": +document.getElementById('testTime').value,
        "проходной_балл": +document.getElementById('testScore').value,
        "id_категории": +document.getElementById('testCategory').value,
        "активен": document.getElementById('active').value === 'true'
      })
    });

    document.getElementById('updateBtn').style.display = 'none';
    document.getElementById('createBtn').style.display = 'inline';

    loadTests();
  }

  async function deleteTest(id) {
    if(confirm('Удалить?')) {
      await fetch(`/api/test/delete/${id}`, {method: 'DELETE'});
      loadTests();
    }
  }

  // Load role
  async function getRole() {
    const res = await fetch(`/api/get_role`, {method: 'GET'});
    const data = await res.json();
    role = data.role;
    if(role === 'admin') document.getElementById('adminPanel').style.display = 'block';
    document.getElementById('userRole').textContent = 'Роль: ' + role;
  }

  getRole()
  loadCategories();
  loadTests();
</script>
</body>
</html>
